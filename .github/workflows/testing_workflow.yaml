name: HTML File Syntax and Structure Checker

on:
  push:
    branches: [main]

jobs:
  validate-html:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install HTML validator
        run: npm install -g htmlhint

      - name: Run HTML validator
        run: htmlhint index.html
